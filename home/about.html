<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<h1>Try a free sample</h1>
<p>Sign up to get a coupon you can redeem at your nearest Dancing Goat cafe for a sample of the colombia Carlos Imbachi coffee. We'll also make sure you don't miss out on news introducing the new coffees that we add to out store regulary</p>
<table>
    <tr>
        <td>
            <label >First name</label>
            <br>
            <input type="text" placeholder="John">
        </td>
        <td>
            <label >Last name</label>
            <br>
            <input type="text" placeholder="Smith">
        </td>
    </tr>
    <tr>
        <td>
            <label >Email address</label>
            <br>
            <input type="email" placeholder="john@example.com">
        </td>
        <td>
            <label >Address</label>
            <br>
            <input type="text" placeholder="Silk St">
        </td>
    </tr>
    <tr>
        <td>
            <label >City</label>
            <br>
            <input type="text" placeholder="London">
        </td>
        <td>
            <label >State</label>
            <br>
            <input type="text" >
        </td>
    </tr>
    <tr>
        <td>
            <label >ZIP code</label>
            <br>
            <input type="text" placeholder="EX2Y8DS">
        </td>
        <td>
            <label >Contry</label>
            <br>
            <select style="width:100%">
                <option value="US">US</option>
                <option value="VI">VI</option>
                <option value="JP">JP</option>
            </select>
        </td>
    </tr>
    <tr>
        <td colspan="2" style="text-align:center">
            <button type="submit">SEND ME FREE COFFEE</button>
        </td>
    </tr>
</table>
</body>
</html>
